name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # bricksafe is pure-Python + OS-independent; force UTF-8 stdio so the demo's Unicode
  # prints render on Windows' cp1252 console too (proves the cross-OS claim, not breaks it).
  PYTHONUTF8: "1"

jobs:
  ci:
    # Public repo → the matrix is free, and the README claims OS-independence, so we prove it.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: uv venv && uv pip install -e ".[dev]"
      - name: Lint (ruff)
        run: uv run ruff check src tests examples
      - name: Typecheck (mypy --strict)
        run: uv run mypy src
      - name: Test (pytest)
        run: uv run pytest -q
      - name: Demo runs
        run: uv run python examples/demo.py